# Continuous integration: build, test, and lint the full monorepo.
#
# Runs on every push to main and on pull requests targeting main.
# This is the authoritative gate -- pre-commit hooks catch most issues
# locally, but CI ensures nothing slips through.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barwise

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Lint
        run: npm run lint
