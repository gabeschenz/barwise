# Build and attach the VS Code extension VSIX to GitHub releases.
#
# Triggers on published releases (created via the GitHub UI or gh CLI).
# Builds the full monorepo, packages the extension, and uploads the
# VSIX as a release asset so users can download and install it with
# `code --install-extension barwise-vscode-*.vsix`.

name: Release VSIX

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: barwise

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: barwise/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
        working-directory: barwise/packages/vscode

      - name: Upload VSIX to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vsix_file=$(ls packages/vscode/*.vsix)
          gh release upload "${{ github.event.release.tag_name }}" "$vsix_file"
