orm_version: "1.0"
model:
  name: Diagram Layout Rules
  object_types:
    - id: 0afbbdc3-67a2-4030-b292-2ecb7543681b
      name: DiagramElement
      kind: entity
      reference_mode: element_id
      definition: A visual component in the diagram, such as an entity node, fact type node, or constraint node.
    - id: c0964759-409f-4c79-9e29-8c4a409e191b
      name: ElementId
      kind: value
      definition: The unique identifier for a diagram element.
      data_type:
        name: text
        length: 50
    - id: 77574463-7059-436b-afef-81d4e71fea85
      name: EntityNode
      kind: entity
      reference_mode: element_id
      definition: A diagram element representing an entity type in the conceptual model.
    - id: e401b92d-36f0-4fe7-800a-cad2f046392f
      name: FactTypeNode
      kind: entity
      reference_mode: element_id
      definition: A diagram element representing a fact type in the conceptual model.
    - id: 4079a2b7-a021-4583-bd8d-47d4fae1ef22
      name: ConstraintNode
      kind: entity
      reference_mode: element_id
      definition: A diagram element representing a constraint in the conceptual model.
    - id: dd031071-b7d2-4c02-922e-cc528771b4cd
      name: Cluster
      kind: entity
      reference_mode: cluster_id
      definition: A grouping of entity nodes that are more densely connected to each other than to nodes in other clusters.
    - id: 1bc4787d-2db0-4aec-b03c-efc2ab57a6c5
      name: ClusterId
      kind: value
      definition: The unique identifier for a cluster.
      data_type:
        name: text
        length: 50
    - id: 234c0d77-57df-4bdd-909e-4a3cbd514dbf
      name: Position
      kind: entity
      reference_mode: position_id
      definition: A two-dimensional coordinate location with x and y values.
    - id: 038f71a0-d1a2-4e09-a42a-95fac722cce5
      name: PositionId
      kind: value
      definition: The unique identifier for a position.
      data_type:
        name: text
        length: 50
    - id: cb4fa273-60f1-481d-b590-2b63feb06399
      name: XCoordinate
      kind: value
      definition: The horizontal coordinate component of a position.
      data_type:
        name: decimal
        length: 10
        scale: 2
    - id: cdf94831-53f1-4624-88e5-4cb0884a367d
      name: YCoordinate
      kind: value
      definition: The vertical coordinate component of a position.
      data_type:
        name: decimal
        length: 10
        scale: 2
    - id: f44ea357-5bfa-44b2-a566-877c4da709eb
      name: Direction
      kind: entity
      reference_mode: direction_id
      definition: An orientation in two-dimensional space, measured as an angle in radians.
    - id: c6b6a6cb-af56-4569-9931-ef87d57a551a
      name: DirectionId
      kind: value
      definition: The unique identifier for a direction.
      data_type:
        name: text
        length: 50
    - id: 2e662fb4-7b62-4af2-8037-7b132228d28e
      name: Angle
      kind: value
      definition: The angle measurement of a direction in radians.
      data_type:
        name: decimal
        length: 10
        scale: 6
    - id: 53cc515b-4a74-4c42-b04e-10f79c7e5aac
      name: Distance
      kind: value
      definition: A non-negative numerical measurement of separation.
      data_type:
        name: decimal
        length: 10
        scale: 2
    - id: cff78392-edd0-4092-b223-aa8b93317dd7
      name: Diagram
      kind: entity
      reference_mode: diagram_id
      definition: The overall diagram container representing the entire visual layout.
    - id: 64fc82a0-fb8d-4104-b0bc-c5c829ba8fde
      name: DiagramId
      kind: value
      definition: The unique identifier for a diagram.
      data_type:
        name: text
        length: 50
    - id: e020d106-43af-40e4-875e-fbfc1a2fecb2
      name: Orientation
      kind: value
      definition: The layout direction of a fact type node, either horizontal or vertical.
      value_constraint:
        values:
          - horizontal
          - vertical
      data_type:
        name: text
        length: 20
