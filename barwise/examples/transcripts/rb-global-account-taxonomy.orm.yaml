orm_version: "1.0"
model:
  name: rb-global-account-taxonomy
  # TODO(barwise): Ask: Temporal: Audit fields (CreatedAt, CreatedBy, UpdatedAt, UpdatedBy) are required on relationship entities and recommended on primary entities. These are not modeled as explicit fact types since they are cross-cutting audit concerns. It is unclear whether they should be formalized as part of the conceptual model or treated as infrastructure metadata. (line 204)
  # NOTE(barwise): Applied with medium confidence: "Every User has a UserStatus." (line 19)
  # NOTE(barwise): Applied with medium confidence: "Every Account has an AccountStatus." (line 135)
  # NOTE(barwise): Applied with medium confidence: "Each Organization has at most one LegalName." (line 75)
  # NOTE(barwise): Applied with medium confidence: "Each Organization has at most one LegalEntityIdentifier." (line 75)
  # NOTE(barwise): Applied with medium confidence: "Each Organization has at most one TaxId." (line 75)
  # NOTE(barwise): Applied with medium confidence: "Each Organization has at most one BuyerProfile." (lines 97-99)
  # NOTE(barwise): Applied with medium confidence: "Each Organization has at most one SellerProfile." (lines 97-99)
  # NOTE(barwise): Removed population for "User has UserStatus" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "Account has AccountStatus" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "UserAccountMembership has MembershipStatus" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "UserAccountMembership has AccountRoleType" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "Organization has OrgType" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "AccountOrganizationLink has LinkStatus" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "AccountOrganizationLink has LinkTransactionRole" that duplicates a value constraint.
  # NOTE(barwise): Removed population for "Invitation has InvitationStatus" that duplicates a value constraint.
  # NOTE(barwise): Removed duplicate constraint "Organization parentage hierarchy must be acyclic." (ring on Organization has parent Organization).
  object_types:
    - id: 60fda4ce-8708-4da3-95af-6b84ae4422b4
      name: User
      # TODO(barwise): Ask: Identification of UserAccountMembership: The transcript states uniqueness is by (UserId, AccountId) but also mentions historical rows are allowed with EffectiveTo tracking. A surrogate MembershipId was assumed as the identifier. It is unclear whether the natural composite key (UserId, AccountId, EffectiveFrom) should be the true identifier or whether a surrogate MembershipId is used. The stakeholders should clarify whether MembershipId exists or if composite identification is intended. (line 39)
      # TODO(barwise): Ask: Temporal: The direct UserOrganizationScope (narrowing layer) is described as optional and may be deferred to a future version. It is unclear whether this should be modeled in v1. The Domain Architect flagged this as an open question. (line 143)
      # TODO(barwise): Ask: Derivation: User access to Organizations is described as derived (through active Membership + active Link), not stored directly. Should the derived access path be formalized as a derived fact type, or is it purely application logic? The transcript describes it as a derivation rule but does not specify whether it should be materialized. (line 139)
      # TODO(barwise): Ask: Overloaded terms: The term 'role' is used in two different senses: (1) AccountRoleType for user permissions within an account (account_owner, account_admin, etc.), and (2) LinkTransactionRole for buyer/seller transaction scope on an AccountOrganizationLink. These are distinct concepts but could cause confusion. (line 51)
      kind: entity
      reference_mode: UserId
      definition: A human identity that can authenticate and act in RB Global's digital platforms. Has one global user profile and can access multiple accounts.
      aliases:
        - person identity
    - id: 842b39ab-3fcd-42b6-8e4c-e3327360142f
      name: UserId
      kind: value
      definition: Globally unique, immutable identifier for a User, issued by the identity platform.
      data_type:
        name: text
        length: 50
    - id: 497317c0-7c68-412b-8f27-3ab7881f278d
      name: EmailAddress
      kind: value
      definition: An email address used as login identifier for a User or as target for an Invitation.
      data_type:
        name: text
        length: 200
    - id: e4c9f2be-c1b9-4d51-a4e0-6783863ec89d
      name: UserStatus
      kind: value
      definition: The current status of a User in the system.
      value_constraint:
        values:
          - active
          - suspended
          - invited
          - deactivated
      data_type:
        name: text
        length: 20
    - id: e1122653-3fc2-45ff-b1d9-ecec0929597f
      name: Account
      # TODO(barwise): Ask: Identification of AccountOrganizationLink: The transcript describes uniqueness per (Account, Organization, OperatingRegion) for current active links, but allows historical rows. A surrogate LinkId was assumed. It is unclear whether a surrogate LinkId exists or if identification is by composite (AccountId, OrganizationId, OperatingRegion, EffectiveFrom). (line 71)
      # TODO(barwise): Ask: Optionality: Is OperatingRegion mandatory on every AccountOrganizationLink, or only for cross-border organizations? The Domain Architect explicitly flagged this as an open question. (line 276)
      # TODO(barwise): Ask: Optionality: Whether Organization should be mandatory at account creation for all onboarding channels. The transcript notes setup accounts can temporarily have zero organizations, but the rule for when linkage becomes mandatory is unclear across channels. (line 131)
      # TODO(barwise): Ask: Constraint completeness: Whether the account_owner role must be unique per account (exactly one owner) or can remain many (multiple co-owners). The transcript says 'at least one, potentially many' but this was explicitly flagged as an open question. (line 254)
      # TODO(barwise): Ask: Constraint completeness: The conditional rule 'If account status is active, at least one active AccountOrganizationLink must exist' is a conditional mandatory constraint that depends on AccountStatus being 'active'. Standard ORM constraints may not directly express this conditional logic without a subset constraint or external rule. Clarification is needed on how to enforce this. (line 135)
      # TODO(barwise): Ask: Constraint completeness: The rule that 'no active membership can exist if account status is closed' and 'no active link can exist if account status is closed' are cross-entity conditional constraints. These may require formalization as external rules or triggers rather than standard ORM constraints. (line 246)
      kind: entity
      reference_mode: AccountId
      definition: A commercial participation container where permissions, preferences, and transaction capabilities are managed for one or more organizations.
    - id: 9aeccaf0-5cb7-4e31-aac2-038eeefef7dd
      name: AccountId
      kind: value
      definition: Globally unique, immutable identifier for an Account.
      data_type:
        name: text
        length: 50
    - id: b89ace9b-0892-4391-9003-4b886add2e89
      name: AccountNumber
      kind: value
      definition: A unique account number used for support and invoicing displays. Immutable once account status becomes active.
      data_type:
        name: text
        length: 30
    - id: fe6cfe49-89b2-486d-a0ec-774a3ab0636e
      name: AccountStatus
      kind: value
      definition: The current status of an Account.
      value_constraint:
        values:
          - setup
          - active
          - suspended
          - closed
      data_type:
        name: text
        length: 20
    - id: ccbbf790-be0b-4f95-8a1e-b9816c12a4ff
      name: Organization
      # TODO(barwise): Ask: Cardinality: Is the Organization-to-OrgType relationship truly many-to-many (one OrgType value can apply to many Organizations AND one Organization can have many OrgType values), or is it one-to-many from Organization? The transcript says 'many-to-many' but since OrgType is a value type with fixed values, this is really multi-valued per Organization (each Organization can have multiple OrgType values). The uniqueness should be on the (Organization, OrgType) pair. (line 87)
      # TODO(barwise): Ask: Granularity: BuyerProfile and SellerProfile are mentioned as optional, role-specific profiles under Organization, but their attributes and lifecycle details are not specified. It is unclear what properties these profiles carry beyond the organizational identity (e.g., onboarding state, compliance controls, permissions). (line 95)
      kind: entity
      reference_mode: OrganizationId
      definition: A transacting entity — the legal or operating party that participates in commercial transactions on the platform.
      aliases:
        - Org
        - transacting entity
    - id: 6f7534ba-b0d9-41f7-b0e9-ac6d72398fd8
      name: OrganizationId
      kind: value
      definition: Globally unique, immutable platform identifier for an Organization.
      data_type:
        name: text
        length: 50
    - id: 10b02f3b-024d-4c94-a0e9-b1366d3d89e0
      name: LegalName
      kind: value
      definition: The legal name of an Organization. Mandatory.
      data_type:
        name: text
        length: 200
    - id: a4aa04ba-fa05-4b34-873a-56f5d4c2c427
      name: LegalEntityIdentifier
      kind: value
      definition: A legal entity identifier (e.g., LEI) for an Organization, conditional based on country and business process.
      data_type:
        name: text
        length: 50
    - id: a2eac7f4-4bf5-429e-844d-06b761858f69
      name: TaxId
      kind: value
      definition: A tax identifier for an Organization, conditional based on jurisdiction.
      data_type:
        name: text
        length: 50
    - id: 11f82916-88b2-4393-9cb2-5fd5a3a4d48f
      name: OrgType
      kind: value
      definition: A classification type for an Organization. Multiple types can apply to one organization.
      value_constraint:
        values:
          - buyer
          - seller
          - logistics_partner
          - internal_entity
      data_type:
        name: text
        length: 30
    - id: ac9f73ff-ccb7-4990-8d0c-88a70b55c155
      name: UserAccountMembership
      kind: entity
      reference_mode: MembershipId
      definition: Records the user's role and lifecycle within an account. Represents the many-to-many relationship between User and Account with attributes.
      aliases:
        - Membership
    - id: 42da79ff-b043-40e2-a45c-6f1f73b9d5f9
      name: MembershipId
      kind: value
      definition: Identifier for a UserAccountMembership instance.
      data_type:
        name: text
        length: 50
    - id: 8a5c7c2d-c626-473f-9786-c08f88abc53f
      name: MembershipStatus
      kind: value
      definition: The lifecycle status of a UserAccountMembership.
      value_constraint:
        values:
          - pending_invite
          - active
          - suspended
          - revoked
      data_type:
        name: text
        length: 20
    - id: 8e04ce2b-758a-4c27-8d7f-dcbbf64dff29
      name: AccountRoleType
      kind: value
      definition: A role type that can be assigned to a user within an account membership context.
      value_constraint:
        values:
          - account_owner
          - account_admin
          - account_member
          - billing_admin
          - read_only
      data_type:
        name: text
        length: 30
    - id: 0c22947c-d995-4dfe-bf85-4918db482ba7
      name: AccountOrganizationLink
      kind: entity
      reference_mode: LinkId
      definition: Represents the many-to-many relationship between Account and Organization, carrying operational scope and lifecycle data.
      aliases:
        - Link
    - id: 0ef78186-1b14-4ee5-adca-771b49c77acb
      name: LinkId
      kind: value
      definition: Identifier for an AccountOrganizationLink instance.
      data_type:
        name: text
        length: 50
    - id: 1d108608-8d6c-4394-923e-18b92807d99b
      name: LinkStatus
      kind: value
      definition: The lifecycle status of an AccountOrganizationLink.
      value_constraint:
        values:
          - active
          - pending_verification
          - suspended
          - terminated
      data_type:
        name: text
        length: 30
    - id: 7e058fb6-c46c-4768-af17-0ee25c2686fb
      name: LinkTransactionRole
      kind: value
      definition: Represents whether an AccountOrganizationLink supports buyer, seller, or both transaction scopes.
      value_constraint:
        values:
          - buyer
          - seller
      data_type:
        name: text
        length: 20
    - id: 0daf7ab7-c37f-41a0-a2d4-57f5a537d84d
      name: OperatingRegion
      kind: value
      definition: The operating region associated with an AccountOrganizationLink.
      data_type:
        name: text
        length: 50
    - id: 394931a8-c914-47d8-8628-ed88ab531b24
      name: EffectiveFromTimestamp
      kind: value
      definition: Timestamp marking the beginning of an effective period.
      data_type:
        name: timestamp
    - id: 407746e3-f47e-48ff-b120-aec9b7e733ed
      name: EffectiveToTimestamp
      kind: value
      definition: Timestamp marking the end of an effective period. Null indicates the current/active row.
      data_type:
        name: timestamp
    - id: fe58d71f-349b-4d6c-a202-0e65c2f37ebc
      name: Invitation
      kind: entity
      reference_mode: InvitationId
      definition: An invitation sent by an existing account admin to an email address for a specific account.
    - id: 47e625fd-02e4-4550-8497-f2397ea119b8
      name: InvitationId
      kind: value
      definition: Globally unique, immutable identifier for an Invitation.
      data_type:
        name: text
        length: 50
    - id: e5af300b-1ce5-4537-9172-ec0e8e31fa0b
      name: InvitationStatus
      kind: value
      definition: The status of an Invitation.
      value_constraint:
        values:
          - issued
          - accepted
          - expired
          - revoked
      data_type:
        name: text
        length: 20
    - id: d26eae8a-a4ea-4fe4-b65e-c3ceeebe0f0c
      name: Timestamp
      kind: value
      definition: A point-in-time timestamp used for audit and lifecycle tracking (e.g., CreatedAt, UpdatedAt, IssuedAt, ExpiryAt).
      data_type:
        name: timestamp
    - id: fd9a4368-0570-4ef6-8b91-f48471f8b9ff
      name: SuspensionReasonCode
      # TODO(barwise): Ask: Granularity: SuspensionReasonCode and RevocationReasonCode are described as 'enumerated values maintained by policy' but no specific allowed values are given. The exact value lists need to be specified. (line 212)
      kind: value
      definition: An enumerated reason code for when a membership is suspended, maintained by policy.
      data_type:
        name: text
        length: 50
    - id: 29da202a-8ec2-46fc-b082-21877b30c9ca
      name: RevocationReasonCode
      kind: value
      definition: An enumerated reason code for when a membership is revoked, maintained by policy.
      data_type:
        name: text
        length: 50
    - id: e77a9a8a-4b23-4240-bf0a-402bc9c62567
      name: BuyerProfile
      kind: entity
      reference_mode: BuyerProfileId
      definition: A role-specific profile under an Organization representing buyer-side capabilities, onboarding state, and compliance controls.
    - id: 1cf46acf-3f6d-48b5-9735-eb3764473090
      name: BuyerProfileId
      kind: value
      definition: Identifier for a BuyerProfile.
      data_type:
        name: text
        length: 50
    - id: 4f838232-23a7-45fa-91a3-7ae33436cda9
      name: SellerProfile
      kind: entity
      reference_mode: SellerProfileId
      definition: A role-specific profile under an Organization representing seller-side capabilities, onboarding state, and compliance controls.
    - id: cdb18430-b01d-4067-8bd2-f152bdd4c7d9
      name: SellerProfileId
      kind: value
      definition: Identifier for a SellerProfile.
      data_type:
        name: text
        length: 50
