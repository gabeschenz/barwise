orm_version: "1.0"
model:
  name: Clinic Appointment Scheduling
  # NOTE(barwise): Applied with medium confidence: "Each Appointment has at most one FollowUpNote." (line 27)
  # NOTE(barwise): Applied with medium confidence: "Only a completed appointment may have a follow-up note. The set of appointmen..." (line 27)
  object_types:
    - id: 04eaeae4-50c4-40ab-909b-b05f5215daee
      name: Patient
      # TODO(barwise): Ask: Primary doctor subset constraint: Should the primary doctor of a patient be one of the doctors the patient has had appointments with, or can it be any doctor in the system? There is no explicit rule about this relationship. (line 35)
      # TODO(barwise): Ask: Cancelled/no-show appointments and scheduling constraints: It is unclear whether the patient and doctor no-double-booking constraints apply to cancelled or no-show appointments. Can a patient book a new appointment in the same time slot if the original was cancelled? (line 19)
      kind: entity
      reference_mode: medical_record_number
      definition: A person who books appointments at the clinic, identified by a medical record number assigned at registration.
    - id: 0f321168-50ce-4b6f-accd-2a56cf810a2c
      name: Doctor
      # TODO(barwise): Ask: Room assignment granularity and relationship to appointments: The transcript says 'A doctor is assigned to a room for the day', but it is not stated whether an appointment inherits the room from the doctor's daily assignment or whether appointments can independently reference a room. Is there a direct link between Appointment and ExamRoom, or is it always derived through the doctor's daily room assignment? (lines 29-31)
      # TODO(barwise): Ask: Room sharing constraint on the same day: The transcript says rooms 'can be shared across doctors on different days', but it is ambiguous whether multiple doctors can share the same room on the same day. Is there a uniqueness constraint on ExamRoom + AppointmentDate preventing two doctors from using the same room on the same day? (line 31)
      kind: entity
      reference_mode: provider_id
      definition: A medical provider at the clinic, identified by a state-issued provider ID.
    - id: 283bb11c-11a1-4564-aaa5-3393ffc81d94
      name: Appointment
      # TODO(barwise): Ask: Optionality of VisitReason: It is unclear whether every appointment must have a reason for visit. The reason is described alongside date and time slot, but only date and time slot are explicitly stated as mandatory. Can an appointment exist without a visit reason? (line 15)
      # TODO(barwise): Ask: Follow-up note constraint: The transcript says 'A completed appointment may also have a follow-up note.' This implies only completed appointments can have follow-up notes. However, this is a conditional constraint (status must be 'completed') that is difficult to express purely with ORM subset constraints between two binary fact types since the status is a value, not a role population match. Should this be modeled as a subset constraint, a business rule annotation, or some other mechanism? (line 27)
      # TODO(barwise): Ask: Temporal tracking of appointment status: The transcript mentions multiple statuses (scheduled, checked-in, in-progress, completed, cancelled, no-show) and that appointments 'start as scheduled'. It is unclear whether only the current status is stored or whether a history of status transitions should be tracked with timestamps. (line 27)
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled visit between a patient and a doctor, identified by a unique confirmation number.
    - id: 14837c15-141e-41fb-8774-4a118124e8f1
      name: ExamRoom
      kind: entity
      reference_mode: room_number
      definition: A physical examination room in the clinic, identified by a room number.
    - id: 11fd2209-17e5-4ffd-80b3-da12fe037179
      name: MedicalRecordNumber
      kind: value
      definition: The unique identifier assigned to a patient at registration.
      data_type:
        name: text
        length: 20
    - id: 5e870459-d065-40ca-8f01-4fab66b032ee
      name: ProviderId
      kind: value
      definition: A unique identifier for a doctor issued by the state medical board.
      data_type:
        name: text
        length: 20
    - id: c9b09321-a75e-44b2-a31c-31aaef6f7827
      name: ConfirmationNumber
      kind: value
      definition: A unique confirmation number assigned to an appointment when it's created.
      data_type:
        name: text
        length: 20
    - id: 4f00580b-df3d-4e0b-a076-364d4c151524
      name: RoomNumber
      kind: value
      definition: The number identifying an exam room.
      data_type:
        name: text
        length: 10
    - id: 17532086-924c-4aac-a043-e92a1a9fcf2d
      name: Specialty
      # TODO(barwise): Ask: Specialty value constraint completeness: The Office Manager lists specialties using 'things like', suggesting the listed values (cardiology, dermatology, family medicine, orthopedics, pediatrics) are examples rather than an exhaustive list. Should the model treat these as the only allowed values, or should the constraint be open-ended to allow additional specialties? (line 7)
      kind: value
      definition: The medical specialty of a doctor.
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
      data_type:
        name: text
        length: 30
    - id: a901d183-34a6-4057-adeb-fa99f37175e4
      name: AppointmentDate
      kind: value
      definition: The calendar date of an appointment.
      data_type:
        name: date
    - id: 68c857ba-2847-42e9-9a38-411b9f9feab1
      name: TimeSlot
      kind: value
      definition: A half-hour time slot during which an appointment can be scheduled.
      value_constraint:
        values:
          - 8:00
          - 8:30
          - 9:00
          - 9:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
      data_type:
        name: time
    - id: 282205ac-70c3-49ed-b816-63bb3fc586dd
      name: VisitReason
      kind: value
      definition: Free-text description of the reason for the patient's visit.
      data_type:
        name: text
        length: 500
    - id: bf94daae-e067-4015-b497-093ee5746e46
      name: AppointmentStatus
      kind: value
      definition: The current status of an appointment.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
      data_type:
        name: text
        length: 20
    - id: db140fc5-7a76-4393-9f45-212652778fc3
      name: FollowUpNote
      kind: value
      definition: Free-text note added to a completed appointment regarding follow-up care.
      data_type:
        name: text
        length: 500
