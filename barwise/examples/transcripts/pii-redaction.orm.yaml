orm_version: "1.0"
model:
  name: pii-redaction
  # TODO(barwise): Skipped constraint: "Each reviewer has exactly one clearance level (standard OR elevated OR restri..." -- Fact type "ClearanceLevel" not found in model. (lines 35-43)
  # TODO(barwise): Skipped constraint: "ConfidenceScore is a decimal between 0 and 1 and determines routing: <0.5 dis..." -- Value constraint has no values specified. (lines 17-31)
  # NOTE(barwise): Applied with medium confidence: "If a finding requires review, it must be reviewed by one Reviewer (one findin..." (lines 45-51)
  # NOTE(barwise): Applied with medium confidence: "When a document reaches redacted status, it must have RedactedText stored." (lines 55-69)
  # TODO(barwise): Skipped constraint: "Each AuditEntry has exactly one AuditId (identifier uniqueness)." -- Fact type "AuditEntry has AuditId" not found in model. (line 81)
  # TODO(barwise): Skipped constraint: "The set of PII categories a clearance level authorizes is a subset relationsh..." -- Fact type "ClearanceLevel" not found in model. (lines 39-43)
  # NOTE(barwise): Applied with medium confidence: "Each Release records a RedactedContentHash for integrity verification (unique..." (line 97)
  # NOTE(barwise): Entity "ReviewDecision" has a reference_mode but no identifier fact type was found.
  object_types:
    - id: 6e0d1386-6da7-495c-b47d-b06bf4d08f78
      name: Document
      kind: entity
      reference_mode: document_id
      definition: An incoming document submitted from a source system that undergoes PII scanning, review, redaction, and release.
      aliases:
        - doc
    - id: a639cacc-d182-48fa-95be-602e5cbea3b7
      name: DocumentId
      kind: value
      definition: System-generated UUID assigned to each document upon arrival.
      data_type:
        name: uuid
    - id: 25d01383-d43e-41b0-904b-1f092a1e587e
      name: SourceSystem
      kind: value
      definition: Controlled code indicating which source system provided the document (customer-support, lending, health-intake, survey).
      value_constraint:
        values:
          - customer-support
          - lending
          - health-intake
          - survey
      data_type:
        name: text
        length: 50
    - id: 10e19877-8b27-4631-b91e-606299bb81c1
      name: ReceivedTimestamp
      kind: value
      definition: Timestamp when the document was received.
      data_type:
        name: datetime
    - id: 0446b66f-7505-4a8d-8c58-f2bf7d08c652
      name: RawText
      kind: value
      definition: The original document content as raw text, retained for audit purposes.
      data_type:
        name: text
        length: 500
    - id: fd60ab67-7d91-4e80-9b35-96796b987960
      name: Finding
      # TODO(barwise): Ask: How do you uniquely identify a Finding?
      kind: entity
      reference_mode: (ambiguous)
      definition: A detected PII occurrence within a specific document and scan version, identified by document + scan version + start position.
    - id: a23b581a-5c65-4ac7-80cf-8a143be0de3d
      name: StartPosition
      kind: value
      definition: Start character index of the PII occurrence in the document text.
      data_type:
        name: integer
    - id: 3b58c9fe-79d3-4dc3-a863-93c58076eac6
      name: EndPosition
      kind: value
      definition: End character index of the PII occurrence in the document text.
      data_type:
        name: integer
    - id: b811d4e8-3c0c-4908-a489-30690abe93d6
      name: ScanVersion
      kind: value
      definition: Integer version of the scan that produced the finding.
      data_type:
        name: integer
    - id: 55a11493-dff7-40d8-9497-54b8379cc125
      name: PIICategory
      kind: value
      definition: Categorical type of PII detected in a finding (e.g., full-name, email-address, etc.).
      value_constraint:
        values:
          - full-name
          - email-address
          - phone-number
          - date-of-birth
          - social-security-number
          - credit-card-number
          - mailing-address
          - ip-address
          - passport-number
          - drivers-license-number
      data_type:
        name: text
        length: 50
    - id: 03dd29c5-faaf-44a8-b218-5c9cdaeedd0d
      name: ConfidenceScore
      kind: value
      definition: Confidence score (0..1) assigned by the scanner to a finding.
      data_type:
        name: decimal
        length: 3
        scale: 2
    - id: 635fcd85-5d99-4e70-a048-e1761dacb7c2
      name: Reviewer
      # TODO(barwise): Ask: How do you uniquely identify a Reviewer?
      kind: entity
      reference_mode: employee_id
      definition: An employee who reviews findings in the compliance department.
      aliases:
        - reviewer_id
    - id: 0f4c26e8-e1bb-4d2c-901b-99539a265c18
      name: EmployeeId
      kind: value
      definition: Identifier for a reviewer (employee).
      data_type:
        name: text
        length: 20
    - id: f7601dce-24c7-4583-8b2f-ee8c44be72f2
      name: ReviewerName
      kind: value
      definition: Reviewer's full name.
      data_type:
        name: text
        length: 100
    - id: 303938ff-9fdb-429a-b217-503987d895a4
      name: ClearanceLevel
      kind: value
      definition: "Reviewer clearance level: standard, elevated, or restricted."
      value_constraint:
        values:
          - standard
          - elevated
          - restricted
      data_type:
        name: text
        length: 20
    - id: 0b8e87ca-853b-488e-a66f-cf492b8fee60
      name: ReviewDecision
      # TODO(barwise): Ask: How do you uniquely identify a ReviewDecision?
      kind: entity
      reference_mode: (ambiguous)
      definition: A decision made by a reviewer on a single finding, recording the decision type, timestamp and optional note.
    - id: 7e6fe522-f0f3-419f-8fbb-9198ec7a4ca7
      name: DecisionType
      kind: value
      definition: "Type of review decision: confirm, reject, or reclassify."
      value_constraint:
        values:
          - confirm
          - reject
          - reclassify
      data_type:
        name: text
        length: 20
    - id: 78d0838d-2fdf-446d-8c51-206f660d09d7
      name: DecisionTimestamp
      kind: value
      definition: Timestamp of the review decision.
      data_type:
        name: datetime
    - id: ccbe994f-69dc-40f4-8deb-fd3bd9494f93
      name: DecisionNote
      kind: value
      definition: Optional note explaining the rationale for the review decision.
      data_type:
        name: text
        length: 500
    - id: 358b3b11-b3b1-4826-baf2-ffafda571085
      name: DocumentStatus
      kind: value
      definition: "Status of the document in its lifecycle: queued, scanned, reviewed, redacted, failed, on-hold."
      value_constraint:
        values:
          - queued
          - scanned
          - reviewed
          - redacted
          - failed
          - on-hold
      data_type:
        name: text
        length: 20
    - id: 5ce3698d-1ea3-4a17-9057-26a73021fcca
      name: RedactedText
      kind: value
      definition: The document text after redaction with category-tagged tokens.
      data_type:
        name: text
        length: 1000
    - id: 16ee349a-72f4-478c-90f5-80aaac3bb9de
      name: AuditEntry
      # TODO(barwise): Ask: How do you uniquely identify a AuditEntry?
      kind: entity
      reference_mode: audit_id
      definition: A logged action on a document capturing who performed it, when, and details.
    - id: 24ff3aec-11a3-4b47-95ee-255925f15d53
      name: AuditId
      kind: value
      definition: Identifier for audit entries.
      data_type:
        name: text
        length: 36
    - id: 05f778fe-e67c-45e9-a01d-39f081413843
      name: AuditTimestamp
      kind: value
      definition: Timestamp of the audit entry.
      data_type:
        name: datetime
    - id: e27db98d-f135-47c1-af97-e95d038548e5
      name: AuditDetail
      kind: value
      definition: Optional detail text for audit entries.
      data_type:
        name: text
        length: 500
    - id: 4ee453e1-9467-4b2b-a24a-e22c571c4a88
      name: ActionType
      kind: value
      definition: "Type of action recorded in audit: scan-initiated, scan-completed, review-assigned, review-completed, redaction-applied, document-released, status-changed."
      value_constraint:
        values:
          - scan-initiated
          - scan-completed
          - review-assigned
          - review-completed
          - redaction-applied
          - document-released
          - status-changed
      data_type:
        name: text
        length: 50
    - id: 6119d56d-1782-4da9-b14c-69e6a5835d5c
      name: ModelVersion
      kind: value
      definition: Model version string for the PII detection model that produced a scan.
      data_type:
        name: text
        length: 50
    - id: 7a290595-e44f-4545-b019-7cd694a8f0d3
      name: Scan
      # TODO(barwise): Ask: How do you uniquely identify a Scan?
      kind: entity
      reference_mode: scan_version
      definition: A scan operation run over a document using a model version that produces findings; scans have an integer scan version.
    - id: 4320db47-3ada-42a6-bbad-63dbf7b8bd99
      name: DownstreamSystem
      kind: value
      definition: Identifier for downstream systems receiving redacted documents (analytics-warehouse, customer-portal, regulatory-filing, partner-api).
      value_constraint:
        values:
          - analytics-warehouse
          - customer-portal
          - regulatory-filing
          - partner-api
      data_type:
        name: text
        length: 50
    - id: 510a6c60-7478-4daf-a620-5b3763836371
      name: Release
      # TODO(barwise): Ask: How do you uniquely identify a Release?
      kind: entity
      reference_mode: (ambiguous)
      definition: A record that a redacted document was released to a downstream system, identified by document and downstream system.
    - id: 4219948f-507d-487b-a871-5a26bb9b3f92
      name: ReleaseTimestamp
      kind: value
      definition: Timestamp when the document was released to a downstream system.
      data_type:
        name: datetime
    - id: 54353e07-0aa0-4577-8a8f-05f217895b68
      name: RedactedContentHash
      kind: value
      definition: Hash of the redacted content used to verify integrity.
      data_type:
        name: text
        length: 128
