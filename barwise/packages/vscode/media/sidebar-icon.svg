<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Left entity type (ellipse) -->
  <ellipse cx="5" cy="12" rx="4" ry="3" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- Right entity type (ellipse) -->
  <ellipse cx="19" cy="12" rx="4" ry="3" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- Role box left -->
  <rect x="9.5" y="10" width="2.5" height="4" stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Role box right -->
  <rect x="12" y="10" width="2.5" height="4" stroke="currentColor" stroke-width="1" fill="none"/>
  <!-- Uniqueness bar -->
  <line x1="10" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Mandatory dot -->
  <circle cx="15" cy="12" r="1" fill="currentColor"/>
</svg>
