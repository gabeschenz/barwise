<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Left entity type (rounded rect / soft oval) -->
  <ellipse cx="30" cy="64" rx="20" ry="14" fill="none" stroke="#e8d44d" stroke-width="2"/>
  <text x="30" y="68" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="#e8d44d">A</text>

  <!-- Right entity type -->
  <ellipse cx="98" cy="64" rx="20" ry="14" fill="none" stroke="#e8d44d" stroke-width="2"/>
  <text x="98" y="68" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="#e8d44d">B</text>

  <!-- Predicate box (two role cells) -->
  <rect x="52" y="56" width="12" height="16" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="64" y="56" width="12" height="16" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Connection lines -->
  <line x1="50" y1="64" x2="52" y2="64" stroke="#4fc3f7" stroke-width="1.5"/>
  <line x1="76" y1="64" x2="78" y2="64" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Uniqueness bar over left role (classic ORM arrow) -->
  <line x1="54" y1="54" x2="62" y2="54" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Mandatory dot on right entity -->
  <circle cx="78" cy="64" r="2.5" fill="#4fc3f7"/>

  <!-- Small "ORM" text at bottom -->
  <text x="64" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7986cb" letter-spacing="2">FREGMA</text>
</svg>
