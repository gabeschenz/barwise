orm_version: "1.0"
model:
  name: order-management
  # TODO(fregma): Skipped constraint: "OrderStatus must be one of: pending, confirmed, shipped, delivered." -- Role-level value constraints from transcripts are not yet supported. (line 23)
  object_types:
    - id: 4370b2b9-0ab6-480b-90d0-13501df68001
      name: Customer
      # TODO(fregma): Ask: The terms 'customer' and 'client' are used differently by CRM and billing: CRM uses 'customer', billing team uses 'client' and considers clients only after payment. It's unclear whether 'client' should be treated as the same concept or a business-subtype. (lines 29-31)
      # TODO(fregma): Ask: Identification format/details for CustomerId, OrderNumber and SKU are not specified (only stated 'unique'); exact data formats are unclear. (lines 7-19)
      kind: entity
      reference_mode: CustomerId
      definition: A person or organization recorded in the CRM that can place orders.
    - id: ef064454-3b06-4b36-8881-95672a345eab
      name: Order
      # TODO(fregma): Ask: It is not stated whether the same Product may appear multiple times on the same Order (i.e., multiple distinct OrderLines for the same Product within an Order). (line 15)
      # TODO(fregma): Ask: OrderLine identification is not specified in the transcript (we proposed an auto-generated identifier). (line 15)
      kind: entity
      reference_mode: OrderNumber
      definition: A purchase request placed by a customer, identified by an order number.
    - id: 178f7b0e-0415-40f4-be1b-c918bcdddbda
      name: Product
      kind: entity
      reference_mode: SKU
      definition: An item available for sale, referenced on order lines by SKU.
    - id: b00b6537-215a-401e-b285-a3a274edb1e3
      name: OrderLine
      # TODO(fregma): Ask: How do you uniquely identify a OrderLine?
      kind: entity
      reference_mode: auto_counter (generated OrderLineId)
      definition: A line on an order that specifies a product and the ordered quantity.
    - id: f35e07d2-6cef-400e-9c10-fdf7764400cc
      name: CustomerId
      kind: value
      definition: The unique identifier assigned to a customer in the CRM.
      data_type:
        name: text
        length: 50
    - id: e1686b50-7095-482d-84ad-10ccc8125582
      name: OrderNumber
      kind: value
      definition: The primary identifier for an order.
      data_type:
        name: text
        length: 50
    - id: 9fcd6ba2-4412-4ad0-94d4-200d2a6d28b4
      name: SKU
      kind: value
      definition: Stock-keeping unit code used to identify a product.
      data_type:
        name: text
        length: 30
    - id: bad5292b-cf8c-4369-b1ab-cc10e0faff5b
      name: OrderStatus
      kind: value
      definition: The lifecycle status of an order.
      value_constraint:
        values:
          - pending
          - confirmed
          - shipped
          - delivered
      data_type:
        name: text
        length: 20
    - id: 36b41580-1674-45be-8f17-4f601ae7c9d6
      name: CustomerName
      kind: value
      definition: The customer's name (text field).
      data_type:
        name: text
        length: 100
    - id: 785dece9-112a-4d75-9e61-6da39cd8ab7a
      name: Quantity
      kind: value
      definition: The number of units of a product on an order line.
      data_type:
        name: integer
