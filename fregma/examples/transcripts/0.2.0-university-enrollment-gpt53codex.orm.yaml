orm_version: "1.0"
model:
  name: university-enrollment
  # TODO(fregma): Ask: Credit values are described as usually 3 or 4 and labs 1 or 2, but it is unclear whether allowed values are strictly {1,2,3,4} or if other whole numbers are permitted. (line 15)
  # NOTE(fregma): Applied with medium confidence: "Each TermCode identifies at most one Term." (line 27)
  # NOTE(fregma): Applied with medium confidence: "Every Course must have some CourseTitle." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Every Course must have some CreditValue." (line 15)
  # TODO(fregma): Skipped constraint: "LetterGrade must be one of A, B, C, D, F." -- Role-level value constraints from transcripts are not yet supported. (line 35)
  # NOTE(fregma): Applied with medium confidence: "For each Student and CourseOffering combination, at most one LetterGrade is r..." (line 35)
  object_types:
    - id: bccdd82b-4fdb-4919-9f58-c45538772eae
      name: Student
      # TODO(fregma): Ask: Early statement says students enroll in courses, later clarified they enroll in offerings; terminology could cause modeling confusion if 'course' and 'course offering' are used interchangeably. (line 3)
      kind: entity
      reference_mode: student_number
      definition: A person admitted to the university who enrolls in course offerings.
    - id: 3fb20680-cd0b-47e7-b27a-bff5014393f6
      name: StudentNumber
      kind: value
      definition: Assigned identifier used to identify a student.
      data_type:
        name: text
        length: 20
    - id: 239dd7bd-b489-4016-8fe8-b5a41dc92e0a
      name: Course
      # TODO(fregma): Ask: CourseOffering reference scheme is not explicitly stated (e.g., composite of Course + Term, or separate section/offering identifier). (line 23)
      kind: entity
      reference_mode: course_code
      definition: A catalog entry such as CS101 with a title and credit value.
    - id: 304c0b80-efd2-4869-8fd0-569bf25733f1
      name: CourseCode
      kind: value
      definition: Unique catalog code for a course (e.g., CS101).
      data_type:
        name: text
        length: 10
    - id: e2ea3f63-ff51-4803-b024-557d094be8b3
      name: CourseTitle
      kind: value
      definition: Free-text title of a course.
      data_type:
        name: text
        length: 200
    - id: b3982702-54b8-47a1-8462-2e652b11bec3
      name: CreditValue
      kind: value
      definition: Whole-number credit amount for a course.
      data_type:
        name: integer
    - id: 24522a29-7517-4418-b7ad-690465e96daf
      name: CourseOffering
      # TODO(fregma): Ask: How do you uniquely identify a CourseOffering?
      kind: entity
      reference_mode: offering_id
      definition: A specific instance of a course in a particular semester, which students enroll in.
    - id: 6f4388b6-7dc6-4dec-b7fc-eb1e2c4ccc59
      name: Instructor
      kind: entity
      reference_mode: employee_id
      definition: A staff member who teaches course offerings.
    - id: 01dff3a1-6f16-43b7-9d80-8fb2741ac299
      name: EmployeeId
      kind: value
      definition: Identifier used to identify an instructor.
      data_type:
        name: text
        length: 20
    - id: 60c2facb-8ed8-4b0f-9183-43907c8d0f8b
      name: Term
      kind: entity
      reference_mode: term_code
      definition: A semester period identified by a term code and bounded by start and end dates.
    - id: 80b82423-c040-4ecb-8358-2bed5c1e89a3
      name: TermCode
      kind: value
      definition: Short code that identifies a term (e.g., F25, SP26).
      data_type:
        name: text
        length: 5
    - id: c19dbb01-6c42-4d91-bdae-6745acb4e6d6
      name: StartDate
      kind: value
      definition: Date on which a term starts.
      data_type:
        name: date
    - id: a43b71f6-fa90-435e-8164-29996389af69
      name: EndDate
      kind: value
      definition: Date on which a term ends.
      data_type:
        name: date
    - id: a4f2514f-61a3-4565-b167-adb25ba9545b
      name: MaximumCapacity
      kind: value
      definition: Maximum number of students allowed in a course offering.
      data_type:
        name: integer
    - id: 191e0162-0d11-4713-884f-ae4b14c3870a
      name: LetterGrade
      kind: value
      definition: Optional letter result assigned after course completion.
      value_constraint:
        values:
          - A
          - B
          - C
          - D
          - F
      data_type:
        name: text
        length: 1
  fact_types:
    - id: 8ede8c89-3335-4613-94c0-46f9784dcc60
      name: Student enrolls in CourseOffering
      roles:
        - id: 8fd5e627-b1af-46f5-bf87-aa8295f2b19e
          player: bccdd82b-4fdb-4919-9f58-c45538772eae
          role_name: enrolls in
        - id: 5f14117b-aa73-4c6c-9207-667068f7fac8
          player: 24522a29-7517-4418-b7ad-690465e96daf
          role_name: has enrolled student
      readings:
        - "{0} enrolls in {1}"
        - "{1} has enrolled student {0}"
      constraints:
        - type: internal_uniqueness
          roles:
            - 8fd5e627-b1af-46f5-bf87-aa8295f2b19e
            - 5f14117b-aa73-4c6c-9207-667068f7fac8
