orm_version: "1.0"
model:
  name: clinic-appointments
  # TODO(fregma): Skipped constraint: "Each Doctor has at most one ProviderId (identifier bijection will be emitted ..." -- Fact type "ProviderId identifies Doctor" not found in model. (line 7)
  # TODO(fregma): Skipped constraint: "Each ProviderId identifies at most one Doctor (identifier bijection)." -- Fact type "ProviderId identifies Doctor" not found in model. (line 7)
  # TODO(fregma): Skipped constraint: "Each Appointment has at most one ConfirmationNumber (identifier bijection wil..." -- Fact type "ConfirmationNumber identifies Appointment" not found in model. (line 11)
  # TODO(fregma): Skipped constraint: "Each ConfirmationNumber identifies at most one Appointment (identifier biject..." -- Fact type "ConfirmationNumber identifies Appointment" not found in model. (line 11)
  # TODO(fregma): Skipped constraint: "Each Patient has at most one MedicalRecordNumber (identifier bijection will b..." -- Fact type "MedicalRecordNumber identifies Patient" not found in model. (line 3)
  # TODO(fregma): Skipped constraint: "Each MedicalRecordNumber identifies at most one Patient (identifier bijection)." -- Fact type "MedicalRecordNumber identifies Patient" not found in model. (line 3)
  # TODO(fregma): Skipped constraint: "For a given Patient on a given Date at a given TimeSlot there is at most one ..." -- Fact type "Patient-Date-TimeSlot determines Appointment" not found in model. (lines 17-19)
  # TODO(fregma): Skipped constraint: "For a given Doctor on a given Date at a given TimeSlot there is at most one A..." -- Fact type "Doctor-Date-TimeSlot determines Appointment" not found in model. (lines 21-23)
  # TODO(fregma): Skipped constraint: "For a given Doctor on a given Date there is at most one assigned ExamRoom (do..." -- Fact type "Doctor-Date determines ExamRoom" not found in model. (lines 29-31)
  # TODO(fregma): Skipped constraint: "AppointmentStatus must be one of: scheduled, checked-in, in-progress, complet..." -- Fact type "AppointmentStatus allowed values" not found in model. (lines 25-27)
  # TODO(fregma): Skipped constraint: "Every Doctor has exactly one Specialty." -- Fact type "Doctor has Specialty" not found in model. (line 7)
  object_types:
    - id: 1b15c921-d6ef-4a54-b3f9-9fe7d4f14563
      name: Patient
      # TODO(fregma): Ask: Unclear whether PrimaryDoctor relationship implies a historical track of which doctor saw the patient for each appointment vs. a single persistent attribute 'primary doctor' — stakeholders used both 'might see Dr. Patel one visit and Dr. Chen the next' and 'we track a primary doctor for each patient.' (lines 33-35)
      # TODO(fregma): Ask: How do you uniquely identify a Patient?
      kind: entity
      reference_mode: medical_record_number
      definition: A person who books appointments at the clinic; identified by a medical record number assigned at registration; has a primary doctor on file.
    - id: e84e72a4-573e-45df-b87a-b61c16777f81
      name: MedicalRecordNumber
      kind: value
      definition: Identifier assigned to a patient at registration (medical record number).
      data_type:
        name: text
        length: 20
    - id: 14d31363-8310-4af3-b0b0-63d7e73596ef
      name: Doctor
      # TODO(fregma): Ask: How do you uniquely identify a Doctor?
      kind: entity
      reference_mode: provider_id
      definition: A licensed provider who sees patients; identified by a provider ID issued by the state medical board; has exactly one specialty.
    - id: deee7ef7-6539-41b4-9669-d01a6c084e7a
      name: ProviderId
      kind: value
      definition: State-issued provider identifier for a doctor.
      data_type:
        name: text
        length: 20
    - id: 2582b393-25a0-4cea-82d1-c050cbeef017
      name: Specialty
      kind: value
      definition: Medical specialty of a doctor.
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
      data_type:
        name: text
        length: 30
    - id: b6d7b070-0504-4616-9229-10b022b71d20
      name: Appointment
      # TODO(fregma): Ask: Whether a FollowUpNote is allowed only when AppointmentStatus is 'completed' (the phrase 'may also have' suggests optionality but does not strictly say follow-up notes are forbidden for other statuses). (lines 25-27)
      # TODO(fregma): Ask: How do you uniquely identify a Appointment?
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled visit between a patient and a doctor for a given date and time slot; created with a unique confirmation number.
    - id: ae8dcb68-aeff-4b55-8d6f-ae26edc6d62d
      name: ConfirmationNumber
      kind: value
      definition: Unique confirmation number assigned to an appointment when created.
      data_type:
        name: text
        length: 20
    - id: 6c7b3a8b-4c03-4bfd-a5b6-b6a7eed4cf08
      name: Date
      kind: value
      definition: Calendar date of the appointment.
      data_type:
        name: date
    - id: f44505ac-58d0-4e4d-b5e3-df7dfbb5aee2
      name: TimeSlot
      kind: value
      definition: Predefined half-hour appointment start times offered by the clinic.
      value_constraint:
        values:
          - 8:00
          - 8:30
          - 9:00
          - 9:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
      data_type:
        name: text
        length: 5
    - id: 6513204b-b64a-4c91-bab3-749bdda0eadc
      name: Reason
      kind: value
      definition: Free-text description of the reason for the visit as provided by the patient when calling.
      data_type:
        name: text
        length: 255
    - id: 5c0fe047-9db9-4656-92cd-924cbc996629
      name: AppointmentStatus
      kind: value
      definition: Lifecycle status of an appointment.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
      data_type:
        name: text
        length: 20
    - id: 8adeefdf-cc97-4d69-9501-f96ff1e9c218
      name: FollowUpNote
      kind: value
      definition: Optional free-text note attached to a completed appointment.
      data_type:
        name: text
        length: 500
    - id: 90ec68c8-8452-4862-8273-c85fed255d00
      name: ExamRoom
      # TODO(fregma): Ask: How do you uniquely identify a ExamRoom?
      kind: entity
      reference_mode: room_number
      definition: An exam room in the clinic identified by a room number; rooms can be assigned to doctors by day and can be shared across days.
    - id: 51a7c223-500b-44b7-9ddd-24e0b8e35287
      name: RoomNumber
      kind: value
      definition: Identifier (room number) for an exam room.
      data_type:
        name: text
        length: 10
  fact_types:
    - id: ff3b8662-d783-4313-bce7-d8334c36b0ee
      name: Patient books Appointment
      roles:
        - id: b85f5a38-9380-48c8-a3c0-23ff588f81a0
