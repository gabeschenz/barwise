orm_version: "1.0"
model:
  name: university-enrollment
  # TODO(fregma): Skipped constraint: "Each Term has at most one TermCode (reference-mode uniqueness)." -- Fact type "Term has TermCode" not found in model. (line 27)
  # TODO(fregma): Skipped constraint: "Each TermCode identifies at most one Term (reference-mode bijection)." -- Fact type "Term has TermCode" not found in model. (line 27)
  # TODO(fregma): Skipped constraint: "A CourseOffering is uniquely identified by the combination of its Course and ..." -- Fact type "CourseOffering is instance of Course + CourseOffering occurs in Term" not found in model. (line 23)
  # TODO(fregma): Skipped constraint: "Credits are restricted to the whole numbers typically used: 1, 2, 3, or 4 (in..." -- Role-level value constraints from transcripts are not yet supported. (line 15)
  # TODO(fregma): Skipped constraint: "Grade must be one of: A, B, C, D, F." -- Role-level value constraints from transcripts are not yet supported. (line 35)
  object_types:
    - id: fad072ae-3f2b-4751-b8d2-0574f5d0235c
      name: Student
      kind: entity
      reference_mode: StudentNumber
      definition: Person admitted to the university who enrolls in course offerings; assigned a student number at admission.
    - id: e61643a7-0190-46d0-b605-c9363a435a31
      name: Course
      # TODO(fregma): Ask: Identification of CourseOffering: transcript implies a CourseOffering is 'a specific instance of that course in a particular semester' but does not state whether offerings are uniquely identified by (Course, Term) or by a separate offering identifier; also not clear whether multiple sections of the same Course in the same Term exist. (lines 21-23)
      kind: entity
      reference_mode: CourseCode
      definition: Catalog entry (e.g., CS101) representing a course subject in the university catalog, identified by a course code.
    - id: 1d470e82-b97e-4a24-861a-dd66d96ec262
      name: CourseOffering
      # TODO(fregma): Ask: How do you uniquely identify a CourseOffering?
      kind: entity
      reference_mode: CourseCode + TermCode (composite of Course and Term) - inferred
      definition: A specific instance of a Course in a particular Term/semester (students enroll in offerings, not the catalog Course).
    - id: 21077a00-4d8f-4148-abc4-c583eeef3510
      name: Instructor
      kind: entity
      reference_mode: EmployeeId
      definition: Person who teaches course offerings; identified by an employee ID.
    - id: e0ed7ec8-f249-439f-ae58-8603dee295e5
      name: Term
      # TODO(fregma): Ask: Terminology: 'semester' vs 'term' — both used interchangeably ("semester" at line 23, "term code" at line 27). Clarify canonical name. (lines 23-27)
      # TODO(fregma): Ask: How do you uniquely identify a Term?
      kind: entity
      reference_mode: TermCode
      definition: An academic term/semester identified by a term code and having start and end dates.
    - id: 3070f807-a017-4e4f-96a5-fa0e479e2c03
      name: StudentNumber
      kind: value
      definition: Identifier assigned to a student at admission.
      data_type:
        name: text
        length: 20
    - id: 41de25ea-8301-42cd-b2be-7e9ff0b7b0bf
      name: CourseCode
      kind: value
      definition: Unique code identifying a catalog Course (e.g., CS101).
      data_type:
        name: text
        length: 10
    - id: 4d9dc8a4-71f5-4630-9faf-11bc10b18e0c
      name: Title
      kind: value
      definition: Free-text title of a Course.
      data_type:
        name: text
        length: 200
    - id: 8f236a3d-42f9-44ee-bb70-acc2481ed734
      name: Credits
      kind: value
      definition: Whole-number credit value for a Course (typical values described).
      value_constraint:
        values:
          - "1"
          - "2"
          - "3"
          - "4"
      data_type:
        name: integer
    - id: 6f522a0b-b6cc-47e2-a5fb-37c8964c32ac
      name: EmployeeId
      kind: value
      definition: Identifier used for instructors (employee ID).
      data_type:
        name: text
        length: 20
    - id: 1e4d36fd-3020-4d7a-a34f-e835190719c0
      name: TermCode
      kind: value
      definition: Short string identifying a term/semester (e.g., "F25", "SP26").
      data_type:
        name: text
        length: 10
    - id: abe79416-330f-4672-934c-4c974d3fb139
      name: StartDate
      kind: value
      definition: Start date of a Term.
      data_type:
        name: date
    - id: c7b7ee0b-fbb4-40d1-9c84-665a0871d2bd
      name: EndDate
      kind: value
      definition: End date of a Term.
      data_type:
        name: date
    - id: 479c65e4-7f34-4a38-a671-d3548105f7ff
      name: MaxCapacity
      kind: value
      definition: Maximum number of students allowed in a CourseOffering.
      data_type:
        name: integer
    - id: 57dcd835-c6c6-4ac9-9894-5b1b1e8cc737
      name: Grade
      kind: value
      definition: Letter grade assigned to a student's completion of a CourseOffering; optional until after the course ends.
      value_constraint:
        values:
          - A
          - B
          - C
          - D
          - F
      data_type:
        name: text
        length: 1
