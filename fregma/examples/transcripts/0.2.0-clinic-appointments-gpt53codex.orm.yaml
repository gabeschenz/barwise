orm_version: "1.0"
model:
  name: clinic-appointments
  # NOTE(fregma): Applied with medium confidence: "Each ExamRoom has at most one RoomNumber." (line 31)
  # NOTE(fregma): Applied with medium confidence: "Each RoomNumber identifies at most one ExamRoom." (line 31)
  # TODO(fregma): Skipped constraint: "TimeSlot must be one of the listed clinic slots." -- Role-level value constraints from transcripts are not yet supported. (line 15)
  # NOTE(fregma): Applied with medium confidence: "Every Appointment is booked by some Patient." (line 3)
  # NOTE(fregma): Applied with medium confidence: "Every Appointment is with some Doctor." (line 3)
  # TODO(fregma): Skipped constraint: "AppointmentStatus must be one of: scheduled, checked-in, in-progress, complet..." -- Role-level value constraints from transcripts are not yet supported. (line 27)
  # NOTE(fregma): Applied with medium confidence: "Likely at most one Doctor is assigned to an ExamRoom on a given day." (line 31)
  object_types:
    - id: 4d8a9b2c-35c2-425a-806c-ce2d30d4d50f
      name: Patient
      kind: entity
      reference_mode: medical_record_number
      definition: A person receiving care at the clinic and scheduling visits.
    - id: e145ff5d-be92-41fe-b75a-3ec81605fd98
      name: Doctor
      # TODO(fregma): Ask: It is unclear whether room is recorded directly per Appointment, or only indirectly via Doctor-to-ExamRoom daily assignment. (lines 29-31)
      # TODO(fregma): Ask: The statement about room sharing specifies different days, but does not explicitly confirm whether multiple doctors can share one room on the same day (e.g., by shifts). (line 31)
      kind: entity
      reference_mode: provider_id
      definition: A licensed provider seen by patients for appointments.
    - id: db72b31c-aad1-44a4-b7cf-ec54aa24a51e
      name: Appointment
      # TODO(fregma): Ask: Follow-up notes are said to apply to completed appointments, but it is unclear whether completed appointments require a follow-up note or if it remains optional. (line 27)
      # TODO(fregma): Ask: Initial status default is stated ('Every appointment starts as scheduled'), but allowed status transitions are not defined. (line 27)
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled clinic visit between a patient and a doctor.
    - id: 467c606e-3e4c-4e20-8057-8079c5f0cbee
      name: ExamRoom
      kind: entity
      reference_mode: room_number
      definition: A clinic room used for seeing patients.
    - id: c12132e8-6030-4cc6-b929-4d88c6ee8bd3
      name: MedicalRecordNumber
      kind: value
      definition: Identifier assigned at registration to identify a patient.
      data_type:
        name: text
    - id: e73846e3-b7c0-4849-8435-2a6194e01c23
      name: ProviderId
      kind: value
      definition: State medical board-issued identifier for a doctor.
      data_type:
        name: text
    - id: f1774009-e8f5-4b84-977c-ead9dcbcdbf5
      name: ConfirmationNumber
      kind: value
      definition: Unique number assigned when an appointment is created.
      data_type:
        name: text
    - id: 7082f185-95cc-4a37-acd7-32fbda9172ae
      name: Specialty
      kind: value
      definition: Clinical specialty of a doctor.
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
      data_type:
        name: text
    - id: d452b252-804f-4f07-939e-b98077dd51f1
      name: AppointmentDate
      kind: value
      definition: Calendar date of an appointment.
      data_type:
        name: date
    - id: 7990beb3-3b39-403b-b6a8-76799a245bad
      name: TimeSlot
      kind: value
      definition: Scheduled clinic time interval for an appointment.
      value_constraint:
        values:
          - 8:00
          - 8:30
          - 9:00
          - 9:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
      data_type:
        name: time
    - id: 9966fa80-86ce-4c54-9e83-e6b6c9099cf5
      name: VisitReason
      kind: value
      definition: Free-text reason provided for the appointment.
      data_type:
        name: text
    - id: 5a261dbc-c53e-4cfb-9eec-c330b1dd4ee8
      name: AppointmentStatus
      kind: value
      definition: Lifecycle state of an appointment.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
      data_type:
        name: text
    - id: b32904a3-8427-40df-be9a-804ac74b2ebe
      name: FollowUpNote
      kind: value
      definition: Optional free-text note recorded for a completed appointment.
      data_type:
        name: text
    - id: 742fb336-d4bd-4207-88dc-3227f52ebd39
      name: RoomNumber
      kind: value
      definition: Identifier for an exam room.
      data_type:
        name: text
