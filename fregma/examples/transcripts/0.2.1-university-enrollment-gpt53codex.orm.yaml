orm_version: "1.0"
model:
  name: university-enrollment
  # TODO(fregma): Ask: The rule "We never exceed" maximum capacity is an operational/external constraint not directly expressible as internal uniqueness, mandatory, or value constraint in this extraction schema. (line 31)
  # NOTE(fregma): Applied with medium confidence: "Each Course has at most one CourseTitle." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Every Course has a CourseTitle." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Each Course has at most one Credits value." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Every Course has a Credits value." (line 15)
  # NOTE(fregma): Applied with medium confidence: "For a given Student and CourseOffering, at most one LetterGrade may be recorded." (line 35)
  # TODO(fregma): Skipped constraint: "LetterGrade must be one of A, B, C, D, or F." -- Role-level value constraints from transcripts are not yet supported. (line 35)
  object_types:
    - id: 147b5447-58c2-441b-bc85-ae563c6c281c
      name: Student
      # TODO(fregma): Ask: Initial wording says students enroll in courses, later clarified that students enroll in offerings, not courses directly; terminology may cause modeling confusion without normalization. (line 3)
      kind: entity
      reference_mode: student_number
      definition: A person admitted to the university who can enroll in course offerings.
    - id: d3346394-12b5-48b3-a123-a78e7bc3b5ff
      name: StudentNumber
      kind: value
      definition: The assigned identifier used to identify a student.
      data_type:
        name: text
        length: 20
    - id: 71b1ae17-b20b-400b-b1d1-8e7f01a9cd44
      name: Course
      # TODO(fregma): Ask: CourseOffering has no explicit single-attribute identifier. The transcript defines it via Course plus Semester (and examples), which suggests composite identification; a single simple reference mode is not stated. (line 23)
      kind: entity
      reference_mode: course_code
      definition: A catalog entry for a class, such as CS101, independent of a specific term instance.
    - id: 84259ed6-1470-42b3-a47c-b43507439c5f
      name: CourseCode
      kind: value
      definition: The unique catalog code for a course.
      data_type:
        name: text
        length: 20
    - id: 28bfddcb-3777-4089-90b4-94fbc4f1fc1e
      name: CourseTitle
      kind: value
      definition: The free-text title of a course.
      data_type:
        name: text
        length: 500
    - id: 709fb03f-0184-4474-a5cb-4f65a59bbf5d
      name: Credits
      kind: value
      definition: The whole-number credit value assigned to a course.
      data_type:
        name: integer
    - id: 9e05da11-5c5c-4db9-978a-3a317a0931b9
      name: Instructor
      kind: entity
      reference_mode: employee_id
      definition: A teacher assigned to teach course offerings.
    - id: d678417c-8d00-490f-b976-5d252656e0b4
      name: EmployeeId
      kind: value
      definition: The identifier used to identify an instructor.
      data_type:
        name: text
        length: 20
    - id: f3499202-fab5-4a64-8d2b-303eaa2a77c3
      name: CourseOffering
      # TODO(fregma): Ask: How do you uniquely identify a CourseOffering?
      kind: entity
      reference_mode: courseOffering_id
      definition: A specific term instance of a catalog course that students enroll in.
    - id: 62ab203c-718f-4e9b-a38b-984e458576f4
      name: Semester
      kind: entity
      reference_mode: term_code
      definition: An academic term identified by a term code.
    - id: 96eee857-c76a-4a10-b035-9ad618274cea
      name: TermCode
      kind: value
      definition: A short string code identifying an academic term.
      data_type:
        name: text
        length: 10
    - id: 90849a8e-8bda-4233-a19d-adc085653e03
      name: StartDate
      kind: value
      definition: The date on which a semester starts.
      data_type:
        name: date
    - id: 887510fe-9dd0-40d5-97df-bb2af4ddeae2
      name: EndDate
      kind: value
      definition: The date on which a semester ends.
      data_type:
        name: date
    - id: 8c05b9f5-f1da-4e34-97ca-78760780ac27
      name: MaximumCapacity
      kind: value
      definition: The maximum allowed enrollment count for a course offering.
      data_type:
        name: integer
    - id: 88138384-b9c1-4aaa-bd55-a0051a5df501
      name: LetterGrade
      kind: value
      definition: The letter grade assigned after course completion.
      value_constraint:
        values:
          - A
          - B
          - C
          - D
          - F
      data_type:
        name: text
        length: 2
