orm_version: "1.0"
model:
  name: clinic-appointments
  # TODO(fregma): Skipped constraint: "TimeSlot must be one of the enumerated times." -- Role-level value constraints from transcripts are not yet supported. (line 15)
  # NOTE(fregma): Constraint "A patient can have at most one appointment per date+time slot.": could not resolve role "Date" in fact type "Patient books Appointment". Skipping this role.
  # NOTE(fregma): Constraint "A patient can have at most one appointment per date+time slot.": could not resolve role "TimeSlot" in fact type "Patient books Appointment". Skipping this role.
  # NOTE(fregma): Constraint "A doctor can have at most one appointment per date+time slot.": could not resolve role "Date" in fact type "Appointment is with Doctor". Skipping this role.
  # NOTE(fregma): Constraint "A doctor can have at most one appointment per date+time slot.": could not resolve role "TimeSlot" in fact type "Appointment is with Doctor". Skipping this role.
  object_types:
    - id: 57b78c2f-c7ba-4180-b19d-8c2c3a00f707
      name: Patient
      kind: entity
      reference_mode: medical_record_number
      definition: A person receiving care at the clinic.
    - id: 499bf660-089b-4b65-8d41-b3c7cc382ea6
      name: Doctor
      kind: entity
      reference_mode: provider_id
      definition: A licensed medical practitioner seeing patients at the clinic.
    - id: fe2bcd34-82f0-490a-87c7-e86a3c004c34
      name: Appointment
      # TODO(fregma): Ask: Identification scheme for Appointment is clear (confirmation number), but format/length is unspecified; used a text(20). (line 11)
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled visit between a patient and a doctor at a specified date and time slot.
    - id: 363ec0f8-f0d5-4162-93c7-a37c9df58115
      name: ExamRoom
      # TODO(fregma): Ask: Subtype section incorrectly set ExamRoom as subtype of 'None' — no subtypes were stated in transcript. (line 31)
      # TODO(fregma): Skipped subtype: ExamRoom is a None -- Supertype entity "None" not found among extracted object types. (line 31)
      # TODO(fregma): Ask: How do you uniquely identify a ExamRoom?
      kind: entity
      reference_mode: room_number
      definition: A room where appointments take place, identified by a room number.
    - id: 80ca5943-b4e4-4075-8b21-4d724aea8a8b
      name: Specialty
      kind: value
      definition: Medical specialty classification for a doctor (e.g., cardiology).
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
      data_type:
        name: text
        length: 30
    - id: 00be0353-1d55-4188-a2d1-57c73b200086
      name: Date
      kind: value
      definition: Calendar date of the appointment.
      data_type:
        name: date
    - id: 4e776d10-9bd3-4dea-90cb-e8d2ab34d3de
      name: TimeSlot
      kind: value
      definition: A discrete appointment time within the clinic schedule.
      value_constraint:
        values:
          - 8:00
          - 8:30
          - 9:00
          - 9:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
      data_type:
        name: text
        length: 5
    - id: 27bfdfaa-e267-4412-bca8-4c06b84cfb0f
      name: Reason
      kind: value
      definition: Free-text reason for the visit provided by the patient.
      data_type:
        name: text
        length: 500
    - id: e6e3bbe4-87e4-4567-be11-969523c7c31c
      name: ConfirmationNumber
      kind: value
      definition: Unique identifier assigned to an appointment upon creation.
      data_type:
        name: text
        length: 20
    - id: dbc48b7f-48ca-4002-a108-c2898f1b6b4c
      name: Status
      kind: value
      definition: Current status of an appointment.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
      data_type:
        name: text
        length: 20
    - id: cfba19ef-24ba-4c5c-ac87-b1d29dda5a31
      name: FollowUpNote
      kind: value
      definition: Free-text follow-up note for completed appointments.
      data_type:
        name: text
        length: 500
    - id: 79f25b00-5aee-4733-a067-0a54bc81a4ff
      name: RoomNumber
      kind: value
      definition: Identifier for an exam room.
      data_type:
        name: text
        length: 10
    - id: 2deb42ad-1e57-4bcd-8d72-1530986939c3
      name: MedicalRecordNumber
      kind: value
      definition: Assigned identifier for a patient at registration.
      data_type:
        name: text
        length: 20
    - id: ed393c84-ca60-4185-a3e1-69f6156498b3
      name: ProviderId
      kind: value
      definition: Provider ID issued by the state medical board identifying a doctor.
      data_type:
        name: text
        length: 20
