      roles:
        - id: 37be1762-66d3-45d1-b265-03827dcbcdad
          player: c036ed15-c720-4e19-b009-6d6f117b6650
          role_name: places
        - id: 73cea74e-a7cf-4686-9518-28498f29f5ed
          player: 8d1b9c25-d5f5-4763-b235-6805df672e71
          role_name: is placed by
      readings:
        - "{0} places {1}"
        - "{1} is placed by {0}"
      constraints:
        - type: internal_uniqueness
          roles:
            - 73cea74e-a7cf-4686-9518-28498f29f5ed
        - type: mandatory
          role: 73cea74e-a7cf-4686-9518-28498f29f5ed
