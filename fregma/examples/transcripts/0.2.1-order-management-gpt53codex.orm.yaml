orm_version: "1.0"
model:
  name: order-management
  # NOTE(fregma): Applied with medium confidence: "Every Product must have a Sku." (line 19)
  # NOTE(fregma): Applied with medium confidence: "For a given Order and Product combination, at most one Quantity is recorded." (line 15)
  # TODO(fregma): Skipped constraint: "OrderStatus must be one of pending, confirmed, shipped, delivered." -- Role-level value constraints from transcripts are not yet supported. (line 23)
  object_types:
    - id: c036ed15-c720-4e19-b009-6d6f117b6650
      name: Customer
      # TODO(fregma): Ask: The terms 'Customer' and 'Client' are said to be the same for this discussion, but billing uses 'Client' with a narrower meaning (only after payment), so scope alignment is unclear. (line 29)
      kind: entity
      reference_mode: customer_id
      definition: A person or party that places orders in the CRM context.
    - id: 8d1b9c25-d5f5-4763-b235-6805df672e71
      name: Order
      # TODO(fregma): Ask: It is unclear whether an Order may contain the same Product on multiple separate lines or whether Product is unique per Order line set. (line 15)
      kind: entity
      reference_mode: order_number
      definition: A purchase request made by a customer, containing products and tracked with status.
    - id: 8f1a3ba0-f96b-48a0-9d41-c9c1831134ff
      name: Product
      kind: entity
      reference_mode: sku
      definition: An item that can be included in order lines and identified by SKU.
    - id: dfa12ede-6eec-4db2-bf4e-c1b442618a01
      name: CustomerId
      kind: value
      definition: The unique CRM identifier assigned to a customer.
      data_type:
        name: text
        length: 20
    - id: 5eedcc98-ef4e-4afc-b01d-7f97763fe22d
      name: OrderNumber
      kind: value
      definition: The primary identifier assigned to an order.
      data_type:
        name: text
        length: 20
    - id: 337ca077-eb6b-4f77-9356-93a09e8ae172
      name: Sku
      kind: value
      definition: The stock-keeping unit code that uniquely identifies a product.
      data_type:
        name: text
        length: 20
    - id: f5a775d0-c115-4d66-91d2-18969d416bf0
      name: Quantity
      kind: value
      definition: The number of units of a product specified on an order line.
      data_type:
        name: integer
    - id: d87d94d0-e33b-4450-8bfc-18f867f0449f
      name: OrderStatus
      kind: value
      definition: The lifecycle status assigned to an order.
      value_constraint:
        values:
          - pending
          - confirmed
          - shipped
          - delivered
      data_type:
        name: text
        length: 30
    - id: fdfbf60b-e20d-46b4-8de7-d4a21dfd6f48
      name: CustomerName
      kind: value
      definition: The textual name stored for a customer.
      data_type:
        name: text
        length: 200
  fact_types:
