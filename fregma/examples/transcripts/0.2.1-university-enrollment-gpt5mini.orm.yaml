orm_version: "1.0"
model:
  name: university-enrollment
  object_types:
    - id: e0dc2e93-bdaf-49a0-a5e0-77be28ebf87c
      name: Student
      # TODO(fregma): Ask: Enrollment capacity enforcement (ensuring count of enrolled students ≤ MaxCapacity) is stated but not modeled as an internal_uniqueness or mandatory constraint; it's an aggregate/quantitative constraint needing procedural or integrity-rule specification. (line 31)
      kind: entity
      reference_mode: student_number
      definition: A person admitted to the university who can enroll in course offerings.
    - id: 1185c0bf-241a-4131-95b4-02dd1963c999
      name: StudentNumber
      kind: value
      definition: Identifier assigned to a student at admission.
      data_type:
        name: text
        length: 20
    - id: c68f81c6-f64f-41b7-84c3-b7b20b030ee0
      name: Course
      # TODO(fregma): Ask: CourseOffering identification is not specified; stakeholders describe offerings by course + term but no single offering identifier was given. Identification may require a composite (Course + Term [+ section])—cannot invent a single reference_mode. (lines 21-23)
      # TODO(fregma): Ask: Grade timing is temporal: 'A grade is optional -- it's only assigned after the course ends.' This is a temporal/conditional constraint (grade optional until course end) and is not represented by the static constraints in this model. (line 35)
      kind: entity
      reference_mode: course_code
      definition: Catalog entry representing a course (e.g., CS101).
    - id: eace4685-c3d7-4e3b-9c02-de7d166d507b
      name: CourseCode
      kind: value
      definition: Short code that uniquely identifies a course in the catalog (e.g., CS101).
      data_type:
        name: text
        length: 10
    - id: 62c1fbe4-9083-4ec5-b158-5b9d4875e2a8
      name: Title
      kind: value
      definition: Free-text title of a course.
      data_type:
        name: text
        length: 200
    - id: 0ef65d04-b734-4399-a7d8-edde8ca98089
      name: Credits
      kind: value
      definition: Whole-number credit value for a course (e.g., 3, 4).
      data_type:
        name: integer
    - id: ed3f6ed2-29d3-4826-83e8-17a0b3075500
      name: CourseOffering
      # TODO(fregma): Ask: How do you uniquely identify a CourseOffering?
      kind: entity
      reference_mode: courseOffering_id
      definition: A specific instance of a course in a particular semester (students enroll in offerings).
    - id: 5452a7ed-c95e-4e1c-9748-2137c32661a3
      name: Term
      kind: entity
      reference_mode: term_code
      definition: A semester identified by a term code and having start/end dates.
    - id: 4affb227-753c-4076-88c6-01057b35abae
      name: TermCode
      kind: value
      definition: Short code identifying a term (e.g., "F25", "SP26").
      data_type:
        name: text
        length: 10
    - id: 792b6852-a7d1-4766-8a67-8c2ce4d1a2ca
      name: StartDate
      kind: value
      definition: Start date of a term.
      data_type:
        name: date
    - id: 210884cf-63d5-4875-9d16-c65448a3669e
      name: EndDate
      kind: value
      definition: End date of a term.
      data_type:
        name: date
    - id: 26f2fc2c-eae3-468d-a6a7-3b3b186ae0cf
      name: Instructor
      kind: entity
      reference_mode: employee_id
      definition: An employee who teaches course offerings.
    - id: 50df12a8-413b-4de5-8217-e46d02cdb850
      name: EmployeeId
      kind: value
      definition: Identifier for an instructor/employee.
      data_type:
        name: text
        length: 20
    - id: 674a4119-c541-4b1e-b663-46935e013ace
      name: MaxCapacity
      kind: value
      definition: Maximum number of students allowed in a course offering.
      data_type:
        name: integer
    - id: d1db267f-10ad-4a39-a389-a006ec65034f
      name: Grade
      kind: value
      definition: Letter grade awarded to a student for an offering.
      value_constraint:
        values:
          - A
          - B
          - C
          - D
          - F
      data_type:
        name: text
        length: 1
