orm_version: "1.0"
model:
  name: clinic-appointments
  # TODO(fregma): Skipped constraint: "Specialty must be one of cardiology, dermatology, family medicine, orthopedic..." -- Role-level value constraints from transcripts are not yet supported. (line 7)
  # NOTE(fregma): Applied with medium confidence: "Every Appointment has a VisitReason." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Each Appointment has at most one AppointmentStatus at a given captured state." (line 27)
  # TODO(fregma): Skipped constraint: "AppointmentStatus must be one of scheduled, checked-in, in-progress, complete..." -- Role-level value constraints from transcripts are not yet supported. (line 27)
  # TODO(fregma): Skipped constraint: "TimeSlot must be one of the listed half-hour slots from 08:00 through 16:30 (..." -- Role-level value constraints from transcripts are not yet supported. (line 15)
  # NOTE(fregma): Applied with medium confidence: "For a given Doctor and CalendarDate, at most one ExamRoom assignment applies." (line 31)
  object_types:
    - id: 5c038d0b-2e5e-4058-b981-55eb32686982
      name: Patient
      kind: entity
      reference_mode: medical_record_number
      definition: A person receiving care at the clinic and booking appointments.
    - id: 34d50cb7-ffa5-427e-9b18-2e4721577639
      name: Doctor
      # TODO(fregma): Ask: It is unclear whether each ExamRoom can be assigned to at most one Doctor on the same CalendarDate; sharing is only described across different days. (line 31)
      kind: entity
      reference_mode: provider_id
      definition: A clinician who sees patients for appointments.
    - id: e1472a33-d5fe-4150-a442-8b27bd4e9076
      name: Appointment
      # TODO(fregma): Ask: The rule 'Every appointment starts as scheduled' is temporal/state-transition logic not fully representable as a static ORM fact/constraint without event/time modeling. (line 27)
      # TODO(fregma): Ask: FollowUpNote applicability is conditional ('completed' appointments may have a follow-up note), but necessity/prohibition for non-completed statuses is not explicitly defined. (line 27)
      kind: entity
      reference_mode: confirmation_number
      definition: A scheduled clinic visit between a patient and a doctor.
    - id: d2b0026d-fd6e-40f8-83b2-0b4658022d37
      name: ExamRoom
      kind: entity
      reference_mode: room_number
      definition: A clinic room used for patient appointments.
    - id: a779ec03-3557-4877-a317-54d81193ee14
      name: MedicalRecordNumber
      kind: value
      definition: Identifier assigned at registration to identify a patient.
      data_type:
        name: text
        length: 20
    - id: 49b0dc85-0fd9-4cf4-852a-c1694868f382
      name: ProviderId
      kind: value
      definition: State medical board issued identifier for a doctor.
      data_type:
        name: text
        length: 20
    - id: c2955be0-0c6a-41d3-a626-3e9c5a706dd4
      name: ConfirmationNumber
      kind: value
      definition: Unique identifier assigned when an appointment is created.
      data_type:
        name: text
        length: 20
    - id: 6ece2272-f9c5-4bec-ba2a-280a43d11bed
      name: RoomNumber
      kind: value
      definition: Identifier used to distinguish an exam room.
      data_type:
        name: text
        length: 10
    - id: 5185a956-d91e-43d2-9287-57e47d09ddfc
      name: Specialty
      kind: value
      definition: Clinical specialty area of a doctor.
      value_constraint:
        values:
          - cardiology
          - dermatology
          - family medicine
          - orthopedics
          - pediatrics
      data_type:
        name: text
        length: 30
    - id: 96f11577-e5ea-469e-8e38-2a7cf19b1f5e
      name: CalendarDate
      kind: value
      definition: A calendar day used for appointment scheduling and room assignment.
      data_type:
        name: date
    - id: 4689451a-b20a-4543-a80b-1fb97b5197d0
      name: TimeSlot
      kind: value
      definition: Discrete appointment start time slot within clinic hours.
      value_constraint:
        values:
          - 08:00
          - 08:30
          - 09:00
          - 09:30
          - 10:00
          - 10:30
          - 11:00
          - 11:30
          - 13:00
          - 13:30
          - 14:00
          - 14:30
          - 15:00
          - 15:30
          - 16:00
          - 16:30
      data_type:
        name: time
    - id: a65cbe40-83bd-47f8-8cb4-f7265153a4c9
      name: VisitReason
      kind: value
      definition: Free-text reason provided for an appointment.
      data_type:
        name: text
        length: 500
    - id: 2ebfd6f9-81da-45b1-99bb-a3882e99ed58
      name: AppointmentStatus
      kind: value
      definition: Lifecycle state of an appointment.
      value_constraint:
        values:
          - scheduled
          - checked-in
          - in-progress
          - completed
          - cancelled
          - no-show
      data_type:
        name: text
        length: 30
    - id: 3578500d-d320-4f1e-be29-54df93043f85
      name: FollowUpNote
      kind: value
      definition: Optional free-text note recorded for completed appointments.
      data_type:
        name: text
        length: 500
