orm_version: "1.0"
model:
  name: order-management
  # TODO(fregma): Skipped constraint: "OrderStatus must be one of: pending, confirmed, shipped, delivered." -- Role-level value constraints from transcripts are not yet supported. (lines 21-23)
  object_types:
    - id: 2575dd91-1ad1-4ed4-bb5b-ee071be01483
      name: Customer
      # TODO(fregma): Ask: Billing 'client' vs CRM 'customer' — unclear whether 'Client' is a synonym, a role, or a strict subtype requiring payment; definition differs by team. (lines 29-31)
      kind: entity
      reference_mode: customer_id
      definition: A person or organization that places orders in the system (CRM).
    - id: b3a45544-ba7f-439c-82ff-150e60ed4bd1
      name: Order
      kind: entity
      reference_mode: order_number
      definition: A purchase request placed by a customer, identified by an order number.
    - id: 0fb72600-5777-40e5-a0af-9e5d44290675
      name: Product
      kind: entity
      reference_mode: sku
      definition: A sellable item that can appear on one or more orders, identified by a SKU.
    - id: 09d2238c-66bd-4f1a-8155-bbbaa68b03f2
      name: CustomerId
      kind: value
      definition: Unique identifier for a Customer (CRM).
      data_type:
        name: text
        length: 20
    - id: e158ac9f-c82d-4e52-a384-670be53bbe37
      name: OrderNumber
      kind: value
      definition: Primary identifier for an Order.
      data_type:
        name: text
        length: 20
    - id: 90f36a0e-20e4-4d53-b70d-281e8200a4b1
      name: SKU
      kind: value
      definition: Stock-keeping unit code identifying a Product.
      data_type:
        name: text
        length: 20
    - id: 7b215764-026f-4f17-9183-d173cd962e16
      name: CustomerName
      kind: value
      definition: Name of the customer.
      data_type:
        name: text
        length: 100
    - id: 0834b2d7-1daf-4c09-823a-8b813fb674a7
      name: OrderStatus
      kind: value
      definition: Status of an Order (enumerated).
      value_constraint:
        values:
          - pending
          - confirmed
          - shipped
          - delivered
      data_type:
        name: text
        length: 20
    - id: b95a61a2-13bc-4f1f-b402-71d972db11ba
      name: Quantity
      kind: value
      definition: Quantity of a Product on an Order line.
      data_type:
        name: integer
