        - id: 315101c9-c357-4740-a7f2-89ad374ed824
          player: b3a45544-ba7f-439c-82ff-150e60ed4bd1
          role_name: is placed by
      readings:
        - "{0} places {1}"
        - "{1} is placed by {0}"
      constraints:
        - type: internal_uniqueness
          roles:
            - 315101c9-c357-4740-a7f2-89ad374ed824
          is_preferred: true
        - type: mandatory
