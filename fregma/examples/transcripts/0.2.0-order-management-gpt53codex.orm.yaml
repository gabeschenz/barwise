orm_version: "1.0"
model:
  name: order-management
  # NOTE(fregma): Applied with medium confidence: "For a given Order and Product combination, at most one Quantity is recorded." (line 15)
  # NOTE(fregma): Applied with medium confidence: "Every Product must have a Sku." (line 19)
  # TODO(fregma): Skipped constraint: "OrderStatus must be one of pending, confirmed, shipped, delivered." -- Role-level value constraints from transcripts are not yet supported. (line 23)
  object_types:
    - id: 032def7c-28e9-496e-9ea1-dc2c167e0a4c
      name: Customer
      # TODO(fregma): Ask: The terms "Customer" and "Client" are used as the same concept for this session, but billing applies a narrower definition (only after payment), which may imply a context-dependent subtype or different bounded concepts. (line 31)
      kind: entity
      reference_mode: customer_id
      definition: A person or party that places orders in the CRM context.
    - id: 48b844d8-481f-4bf3-a2e2-9c5f6741e703
      name: Order
      # TODO(fregma): Ask: The transcript mentions "each line in the order" but does not define whether OrderLine is an explicit entity with its own identifier or whether Product appears at most once per Order. (line 15)
      kind: entity
      reference_mode: order_number
      definition: A purchase transaction placed by a customer, identified by an order number.
    - id: cae15496-dbaa-403c-8da9-172d6c05813e
      name: Product
      kind: entity
      reference_mode: sku
      definition: An item that can be included in orders.
    - id: 86ba2fcf-a33f-43cb-9eba-2b1129c05ef9
      name: CustomerId
      kind: value
      definition: Unique CRM identifier assigned to a customer.
      data_type:
        name: text
        length: 50
    - id: 9066c449-5075-45c5-ba81-f43c45c634b3
      name: OrderNumber
      kind: value
      definition: Primary identifier assigned to an order.
      data_type:
        name: text
        length: 50
    - id: b2533ef2-35a1-4896-bb4e-6cc5f607e183
      name: Sku
      kind: value
      definition: Unique stock-keeping unit code for a product.
      data_type:
        name: text
        length: 50
    - id: efafb3ae-8b04-4416-880e-55b2e60cbdab
      name: OrderStatus
      kind: value
      definition: Lifecycle state of an order.
      value_constraint:
        values:
          - pending
          - confirmed
          - shipped
          - delivered
      data_type:
        name: text
        length: 20
    - id: 92c94e1e-d97a-4c3b-955f-6d22cf4e26f1
      name: CustomerName
      kind: value
      definition: Textual name of a customer.
      data_type:
        name: text
        length: 200
    - id: 924ea5db-202e-4895-a873-cb7746d8e41d
      name: Quantity
      kind: value
      definition: Number of units of a product specified in an order line.
      data_type:
        name: integer
